{% set name = "jaraco.context" %}
{% set version = "6.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jaraco_context-{{ version }}.tar.gz
  sha256: 953ae8dddb57b1d791bf72ea1009b32088840a7dd19b9ba16443f62be919ee57

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=56
    - setuptools_scm >=3.4.1
  run:
    - python >={{ python_min }}
    - backports.tarfile

test:
  requires:
    - python {{ python_min }}
  imports:
    - jaraco.context

about:
  home: https://github.com/jaraco/jaraco.context
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Context managers by jaraco
  doc_url: https://jaracocontext.readthedocs.io/
  dev_url: https://github.com/jaraco/jaraco.context

extra:
  recipe-maintainers:
    - carlodri
